<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Art Gallery</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6efe6;
      margin: 0;
      padding: 40px;
    }

    .title {
      text-align: center;
      color: #b56b6b;
      margin-bottom: 40px;
      font-size: 32px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .card {
      background: #fdf6ee;
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
      text-align: center;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: translateY(-8px);
    }

    .card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 15px;
    }

    .card p {
      margin-top: 15px;
      font-size: 16px;
      color: #444;
    }

    .thoughts-section {
      margin-top: 60px;
      background: #fff;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.1);
    }

    .thought-item {
      background: #fdf6ee;
      padding: 15px;
      margin: 10px 0;
      border-radius: 10px;
      border-left: 4px solid #b56b6b;
      text-align: left;
    }
  </style>
</head>
